<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Manage · Orchard Collection</title><link rel="icon" href="assets/logo.svg"><link rel="stylesheet" href="styles.css"></head><body>
<header class="topbar"><nav class="nav"><a class="brand" href="index.html"><img src="assets/logo.svg"><span>Orchard Collection<small>Local record editor</small></span></a></nav></header>
<main class="container" style="margin-top:30px"><section class="panel"><h1 style="font-size:2.4rem;color:var(--forest)">Manage a plant</h1><p>This editor saves changes in this browser. Export a backup or edit <code>data/plants.json</code> in GitHub to publish permanent changes.</p><div class="toolbar"><select class="select" id="plantSelect" style="flex:1"></select><button class="button secondary" id="exportBtn">Export overrides</button><button class="button secondary" id="clearBtn">Clear local edits</button></div></section>
<section class="panel"><form id="editForm"><div class="info-list"><label class="info-item"><span>Plant name</span><input class="search" name="name"></label><label class="info-item"><span>Status</span><input class="search" name="status"></label><label class="info-item"><span>Condition</span><input class="search" name="condition"></label><label class="info-item"><span>Location</span><input class="search" name="location"></label><label class="info-item"><span>Hero photo URL</span><input class="search" name="heroPhoto"></label><label class="info-item"><span>Peduncles</span><input class="search" type="number" name="peduncles"></label><label class="info-item"><span>Last watered</span><input class="search" type="date" name="lastWatered"></label><label class="info-item"><span>Last fertilized</span><input class="search" type="date" name="lastFertilized"></label><label class="info-item"><span>Light PPFD</span><input class="search" name="lightPPFD"></label><label class="info-item"><span>Current value</span><input class="search" name="currentValue"></label></div><label><strong>Notes</strong><textarea class="search" name="notes" rows="5" style="width:100%;margin-top:8px"></textarea></label><div class="actions"><button class="button" type="submit">Save local changes</button><a class="button secondary" id="viewBtn">View plant page</a></div></form></section></main>
<script src="app.js"></script><script>(async()=>{const base=await fetch('./data/plants.json').then(r=>r.json()),sel=document.getElementById('plantSelect'),form=document.getElementById('editForm');sel.innerHTML=base.map(p=>`<option value="${p.accession}">${p.accession} · ${p.name}</option>`).join('');const ovs=()=>JSON.parse(localStorage.getItem('orchardPlantOverrides')||'{}');function load(){const p={...base.find(x=>x.accession===sel.value),...(ovs()[sel.value]||{})};[...form.elements].forEach(e=>{if(e.name)e.value=p[e.name]??''});document.getElementById('viewBtn').href='plant.html?id='+sel.value}sel.onchange=load;form.onsubmit=e=>{e.preventDefault();const o=ovs(),d=Object.fromEntries(new FormData(form));d.peduncles=Number(d.peduncles||0);o[sel.value]=d;localStorage.setItem('orchardPlantOverrides',JSON.stringify(o));alert('Saved in this browser.')};document.getElementById('exportBtn').onclick=()=>{const b=new Blob([JSON.stringify(ovs(),null,2)],{type:'application/json'}),a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='orchard-overrides.json';a.click()};document.getElementById('clearBtn').onclick=()=>{if(confirm('Remove all local edits?')){localStorage.removeItem('orchardPlantOverrides');load()}};load()})()</script></body></html>
