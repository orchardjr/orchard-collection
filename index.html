<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0D2218" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Orchard Collection" />
  <meta name="description" content="Orchard Collection plant collection manager" />
  <title>Orchard Collection</title>
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png?v=4.0.5" />
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png?v=4.0.5" />
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png?v=4.0.5" />
  <link rel="shortcut icon" href="/favicon.ico?v=4.0.5" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="stylesheet" href="./brand.css" />
  <link rel="stylesheet" href="./styles-v423.css" />
</head>
<body>
  <main id="app">
    <section class="loading-screen">
      <div class="brand-mark">OC</div>
      <p>Opening Orchard Collection…</p>
    </section>
  </main>

  <input id="photo-picker" type="file" accept="image/*" hidden />
  <div id="modal-root"></div>
  <div id="toast" class="toast" role="status" aria-live="polite"></div>
  <div id="build-marker" aria-label="App version">v4.2.3</div>

  <script type="module" src="./app-v423.js"></script>
  <script>
    window.ORCHARD_BUILD = "4.2.3";
    (async () => {
      try {
        if ("serviceWorker" in navigator) {
          const registrations = await navigator.serviceWorker.getRegistrations();
          await Promise.all(registrations.map(registration => registration.unregister()));
        }
        if ("caches" in window) {
          const names = await caches.keys();
          await Promise.all(names.map(name => caches.delete(name)));
        }
        const resetKey = "orchard-v423-cache-reset";
        if (!sessionStorage.getItem(resetKey)) {
          sessionStorage.setItem(resetKey, "done");
          const url = new URL(location.href);
          url.searchParams.set("build", "423");
          location.replace(url.toString());
        }
      } catch (error) {
        console.warn("Orchard cache reset could not complete", error);
      }
    })();
  </script>
</body>
</html>
