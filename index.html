<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0D2218" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Orchard Collection" />
  <meta name="description" content="Orchard Collection plant collection manager" />
  <title>Orchard Collection</title>
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
  <link rel="shortcut icon" href="/favicon.ico" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="stylesheet" href="./brand.css" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <main id="app">
    <section class="loading-screen">
      <div class="brand-mark">OC</div>
      <p>Opening Orchard Collection…</p>
    </section>
  </main>

  <input id="photo-picker" type="file" accept="image/*" capture="environment" hidden />
  <div id="modal-root"></div>
  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script type="module" src="./app.js"></script>
  <script>
    if ("serviceWorker" in navigator) window.addEventListener("load",()=>navigator.serviceWorker.register("/service-worker.js"));
  </script>
</body>
</html>
